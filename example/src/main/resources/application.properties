# oidc integration
%dev.quarkus.oidc.auth-server-url=http://localhost:58080/realms/rciam
quarkus.oidc.authorization-path=/protocol/openid-connect/auth
quarkus.oidc.token-path=/protocol/openid-connect/token
quarkus.oidc.discovery-enabled=false
quarkus.oidc.introspection-path=/protocol/openid-connect/token/introspect
quarkus.oidc.client-id=backend-service
quarkus.oidc.credentials.secret=secret
quarkus.oidc.user-info-path=/protocol/openid-connect/userinfo
quarkus.oidc.authentication.user-info-required=false

# ---------------------------------------------------------
# Keycloak Dev Services
# ---------------------------------------------------------
quarkus.keycloak.devservices.enabled=false

# Keycloak User Entitlements
api.auth.entitlements.parent-group=status-pages
api.auth.entitlements.namespace=urn:rciam.example.org
api.auth.entitlements.super-admin-role=super_admin

# ---------------------------------------------------------
# Datasource production configuration
# ---------------------------------------------------------
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=root
%prod.quarkus.datasource.password=secret
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/example

# ---------------------------------------------------------
# Datasource development configuration
# ---------------------------------------------------------
dev.quarkus.datasource.devservices.port=0
%dev.quarkus.datasource.devservices.db-name=example
%dev.quarkus.datasource.devservices.username=example
%dev.quarkus.datasource.devservices.password=example

api.auth.oidc.user.unique.id=voperson_id
api.auth.entitlements.keycloak-group-management-client-url=http://localhost:58080/realms/rciam/
api.auth.entitlements.keycloak-group-management-client-id=status.page.manage.groups
api.auth.entitlements.keycloak-group-management-client-secret=nlKena9eYtF7XMeP8kZD0YU9pStxPggN

# keycloak properties for feeding the oidc_client html template
api.html.keycloak.url=http://localhost:58080
api.html.keycloak.realm=rciam
api.html.keycloak.public.client.id=frontend-service
api.html.keycloak.javascript.adapter=/js/keycloak.min.js
api.html.oidc.client.url=http://localhost:8080/oidc-client
api.html.swagger.documentation=http://localhost:8080/q/swagger-ui
